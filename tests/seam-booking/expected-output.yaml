- name: eap6/java-ee/seam
  description: This ruleset provides generic migration knowledge from the Seam 2 UI
    controls to pure JSF 2 UI Controls
  tags:
  - JBoss EAR descriptor
  - JBoss EJB XML deployment descriptor prior to EAP 6
  - JBoss Seam Components (components.xml)
  - JBoss Seam Pages
  - JSF Seam 2.x tag library usage
  - configuration
  - deployment
  - descriptor
  - jboss-eap5
  - jsf
  - seam
  violations:
    seam-ui-jsf-00001-01:
      description: JSF Seam 2 UI control s:button
      category: mandatory
      labels:
      - jsf
      - konveyor.io/source=eap
      - konveyor.io/source=eap5
      - konveyor.io/source=java-ee
      - konveyor.io/source=seam
      - konveyor.io/source=seam2
      - konveyor.io/target=eap
      - konveyor.io/target=eap6
      - konveyor.io/target=eap7
      - seam
      incidents:
      - uri: file:///source/test-files/seam-booking-5.2/view/book.xhtml
        message: |-
          Seam UI's `<s:button>` JSF control should be replaced by `<h:button>`.
           There are differences in attributes, for example the _action_ attribute maps to _outcome_ and there is no _propagation_ attribute.
        codeSnip: "95  \t\t\t<h:commandButton id=\"proceed\" value=\"Proceed\" action=\"#{hotelBooking.setBookingDetails}\"/>"
        lineNumber: 94
        variables:
          data: button
          innerText: ""
          matchingXML: ""
