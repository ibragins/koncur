name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME=koncur-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "${BINARY_NAME}" ./cmd/koncur
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: koncur-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 90

  test-archive:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Build test archive
        run: make test-archive

      - name: Upload test archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: koncur-tests
          path: koncur-tests.tar.gz
          retention-days: 90

  release:
    needs: [build, test-archive]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Move binaries
          for dir in artifacts/koncur-*/; do
            cp "${dir}"* release/ 2>/dev/null || true
          done
          # Move test archive
          cp artifacts/koncur-tests/koncur-tests.tar.gz release/
          ls -lh release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Get short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Write release notes
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          envsubst < .github/release-notes.md > release-notes.md

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --cleanup-tag --yes 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest \
            --title "Latest Build (${SHORT_SHA})" \
            --notes-file release-notes.md \
            --prerelease \
            release/*
