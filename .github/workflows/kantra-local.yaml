# Same setup as kantra.yaml, but passes kantra.forceLocal (local analysis).
# Only Java-analysis tests are executed here — .NET and Python suites stay on the main kantra workflow.
name: Koncur Test with kantra (local Java)

on:
  workflow_call:
    inputs:
      skip_maven:
        description: "Whether to setup access to the testing maven packages"
        default: true
        type: boolean
      os:
        description: os to run on
        required: true
        type: string

jobs:
  kantra-local-test:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Verify local/bin is on the path
        shell: bash
        run: |
          mkdir -p $HOME/.local/bin
          echo $HOME/.local/bin >> $GITHUB_PATH

      - name: Install podman and extract Kantra bundle (macos)
        if: ${{ inputs.os == 'macos-15-intel' }}
        shell: bash
        run: |
          choco install podman-cli
          podman machine init --rootful --memory 10240 --cpus 3
          podman machine start 
          CID=$(podman create quay.io/konveyor/kantra:latest)
          podman cp "${CID}:/usr/local/bin/." ./
          podman cp "${CID}:/jdtls/" ./
          podman cp "${CID}:/usr/local/static-report/" ./
          podman cp "${CID}:/opt/rulesets/" ./
          podman cp "${CID}:/usr/bin/fernflower.jar" ./
          podman cp "${CID}:/usr/local/etc/." ./
          podman rm kantra-download
          cp windows-kantra $HOME/.local/bin/kantra.exe
          ls -la $HOME/.local/bin/kantra.exe
          $HOME/.local/bin/kantra version

      - name: Install podman and extract Kantra bundle (windows)
        if: ${{ inputs.os == 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          choco install podman-cli
          podman machine init --rootful --memory 10240 --cpus 3
          podman machine start
          BUNDLE="$HOME/.local/kantra-bundle"
          mkdir -p "$BUNDLE"
          CID=$(podman create quay.io/konveyor/kantra:latest)
          podman cp "${CID}:/usr/local/bin/." "$BUNDLE/"
          podman cp "${CID}:/jdtls/" "$BUNDLE/"
          podman cp "${CID}:/usr/local/static-report/" "$BUNDLE/"
          podman cp "${CID}:/opt/rulesets/" "$BUNDLE/"
          podman cp "${CID}:/usr/bin/fernflower.jar" "$BUNDLE/"
          podman cp "${CID}:/usr/local/etc/." "$BUNDLE/"
          podman rm "$CID"
          # Linux ELF binary from the image is named 'kantra'; Git Bash resolves `kantra`
          # before kantra.exe and fails with Exec format error — remove it on Windows hosts.
          rm -f "$BUNDLE/kantra"
          if [[ -f "$BUNDLE/windows-kantra" ]]; then
            mv "$BUNDLE/windows-kantra" "$BUNDLE/kantra.exe"
          fi
          # Kantra resolves assets under ~/.kantra; sync from bash next (same pattern as macOS — avoids PowerShell Copy-Item issues with podman-extracted trees).
          echo "$BUNDLE" >> "$GITHUB_PATH"
          ls -la "$BUNDLE/kantra.exe"

      - name: Copy Kantra bundle assets to user profile (windows)
        if: ${{ inputs.os == 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE="$HOME/.local/kantra-bundle"
          DEST="$HOME/.kantra"
          if [[ ! -d "$BUNDLE" ]]; then
            echo "Kantra bundle not found: $BUNDLE"
            exit 1
          fi
          mkdir -p "$DEST"
          shopt -s nullglob
          for item in "$BUNDLE"/*; do
            base=$(basename "$item")
            if [[ "$base" == "kantra.exe" || "$base" == "kantra" ]]; then
              continue
            fi
            rm -rf "$DEST/$base"
            cp -a "$item" "$DEST/"
          done
          ls -la "$DEST"
          "$BUNDLE/kantra.exe" version

      - name: Also add kantra-bundle to windows path and get host wsl ip 
        if: ${{ inputs.os == 'windows-latest' }}
        shell: powershell
        run: |
          $HOST_IP=Get-NetIpAddress | where { $_.InterfaceAlias -Like '*WSL*' -and $_.AddressFamily -EQ "IPv4" } | select -ExpandProperty IPAddress
          $HOST_IP
          Write-Output "NETWORK_GATEWAY=$HOST_IP" >> $env:GITHUB_ENV
          # Bash $HOME is usually the workspace on Windows runners; prefer it for PATH.
          $bundle = Join-Path $env:GITHUB_WORKSPACE ".local\kantra-bundle"
          if (-not (Test-Path -LiteralPath $bundle)) {
            $bundle = Join-Path $env:USERPROFILE ".local\kantra-bundle"
          }
          Write-Output "$bundle" >> $env:GITHUB_PATH
          $bin = Join-Path $env:GITHUB_WORKSPACE ".local\bin"
          if (-not (Test-Path -LiteralPath $bin)) {
            $bin = Join-Path $env:USERPROFILE ".local\bin"
          }
          Write-Output "$bin" >> $env:GITHUB_PATH

      - name: Create containers config for host networking
        if: ${{ inputs.os == 'ubuntu-24.04-arm' }}
        shell: bash
        run: |
          mkdir -p $HOME/.config/containers
          cat <<-EOF > /$HOME/.config/containers//containers.conf
          # [containers]
          # netns="host"
          [network]
          network_cmd_options = ["allow_host_loopback=true"]
          EOF

      - name: Extract Kantra bundle (linux)
        if: ${{ inputs.os == 'ubuntu-24.04-arm' }}
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE="$HOME/.local/kantra-bundle"
          mkdir -p "$BUNDLE"
          CID=$(podman create quay.io/konveyor/kantra:latest)
          podman cp "${CID}:/usr/local/bin/." "$BUNDLE/"
          podman cp "${CID}:/jdtls/" "$BUNDLE/"
          podman cp "${CID}:/usr/local/static-report/" "$BUNDLE/"
          podman cp "${CID}:/opt/rulesets/" "$BUNDLE/"
          podman cp "${CID}:/usr/bin/fernflower.jar" "$BUNDLE/"
          podman cp "${CID}:/usr/local/etc/." "$BUNDLE/"
          podman rm "$CID"
          if [[ -f "$BUNDLE/kantra" ]]; then
            chmod +x "$BUNDLE/kantra"
          elif [[ -f "$BUNDLE/linux-kantra" ]]; then
            mv "$BUNDLE/linux-kantra" "$BUNDLE/kantra"
            chmod +x "$BUNDLE/kantra"
          fi
          # Linux Kantra expects assets under ~/.config/.kantra. CI often sets $HOME to the
          # workspace; use the passwd home (e.g. /home/runner) so Kantra finds rulesets.
          RUNNER_HOME="$(getent passwd "$(id -un)" | cut -d: -f6)"
          KANTRA_USER_DIR="$RUNNER_HOME/.config/.kantra"
          mkdir -p "$KANTRA_USER_DIR"
          while IFS= read -r -d '' item; do
            base=$(basename "$item")
            if [[ "$base" == "kantra" || "$base" == "kantra.exe" ]]; then
              continue
            fi
            mv "$item" "$KANTRA_USER_DIR/"
          done < <(find "$BUNDLE" -mindepth 1 -maxdepth 1 -print0)
          ls -la "$KANTRA_USER_DIR"
          echo "$BUNDLE" >> "$GITHUB_PATH"
          podman network inspect podman
          echo "NETWORK_GATEWAY=host.containers.internal" >> "$GITHUB_ENV"
          export PATH="$BUNDLE:$PATH"
          kantra version

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # Local Kantra analysis expects a JDK and Maven on PATH (same layout on Linux, macOS, Windows).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Maven (>= 3.9.9)
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.11

      - name: Verify Java and Maven
        shell: bash
        run: |
          set -euo pipefail
          echo "JAVA_HOME=${JAVA_HOME:-}"
          java -version
          mvn -version

      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build Koncur
        shell: bash
        run: |
          go build -o $HOME/.local/bin/koncur ./cmd/koncur/main.go

      - name: Allow firewall rule
        if: ${{ !inputs.skip_maven && inputs.os == 'windows-latest' }}
        shell: powershell
        run: |
          $wslAdapter = Get-NetAdapter | Where-Object {$_.Name -like "*WSL*"}
          if ($wslAdapter) {
            $wslIP = Get-NetIPAddress -InterfaceIndex $wslAdapter.InterfaceIndex | Where-Object {$_.AddressFamily -eq "IPv4"}
            if ($wslIP) {
              $networkRange = "$($wslIP.IPAddress)/$($wslIP.PrefixLength)"
              Write-Host "Found WSL network: $networkRange"
              netsh advfirewall firewall add rule name="WSL2-Auto" dir=in action=allow protocol=TCP remoteip=$networkRange
            }
          }

      - name: Run server for maven-local-resources
        if: ${{ !inputs.skip_maven }}
        uses: Eun/http-server-action@v1
        with:
          directory: local-maven-resources
          port: 8085

      - name: Set maven settings path (Windows)
        if: ${{ !inputs.skip_maven && inputs.os == 'windows-latest' }}
        shell: bash
        run: |
          mkdir -p "$HOME/.koncur/temp"
          WINDOWS_PATH=$(cygpath -w "$HOME/.koncur/temp/settings.xml")
          echo "MAVEN_SETTINGS_PATH=$WINDOWS_PATH" >> $GITHUB_ENV

      - name: Set maven settings path (Unix)
        if: ${{ !inputs.skip_maven && inputs.os != 'windows-latest' }}
        shell: bash
        run: |
          mkdir -p "$HOME/.koncur/temp"
          echo "MAVEN_SETTINGS_PATH=$HOME/.koncur/temp/settings.xml" >> $GITHUB_ENV

      - name: Create maven settings file
        if: ${{ !inputs.skip_maven }}
        uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          repositories: '[{"id": "tackle-testapp-public", "name": "Local tackle-testapp repo", "url": "http://${{ env.NETWORK_GATEWAY }}:8085"}]'
          mirrors: '[{"id": "maven-default-http-blocker", "name": "disable http block", "mirrorOf": "tackle-testapp-public", "url": "http://${{ env.NETWORK_GATEWAY }}:8085", "blocked": false}]'
          path: "${{ env.MAVEN_SETTINGS_PATH }}"

      - name: Create kantra config (local Java analysis)
        if: ${{ !inputs.skip_maven }}
        shell: bash
        run: |
          mkdir -p .koncur/config
          cat << EOF > .koncur/config/target-kantra.yaml
          type: kantra
          kantra:
            forceLocal: true
            mavenSettings: '${{ env.MAVEN_SETTINGS_PATH }}'
          EOF

      - name: Create kantra config without maven (local Java analysis)
        if: ${{ inputs.skip_maven }}
        shell: bash
        run: |
          mkdir -p .koncur/config
          cat << 'EOF' > .koncur/config/target-kantra.yaml
          type: kantra
          kantra:
            forceLocal: true
          EOF

      - name: Run Java-analysis tests only (local mode)
        shell: bash
        env:
          SKIP_MAVEN: ${{ fromJSON(inputs.skip_maven) }}
        run: |
          set -euo pipefail
          mkdir -p koncur-local-results
          # Java-only: excludes nerd-dinner (.NET) and python-sample (Python).
          JAVA_TESTS=(
            tests/acmeair-webapp/test.yaml
            tests/book-server-deps/test.yaml
            tests/book-server-source/test.yaml
            tests/coolstore-deps-quarkus-branch/test.yaml
            tests/coolstore-source-and-dependencies/test.yaml
            tests/daytrader/test.yaml
            tests/openmrs/test.yaml
            tests/petclinic-hazelcast/test.yaml
            tests/seam-booking/test.yaml
            tests/tomcat-legacy/test.yaml
            tests/tackle-testapp-binary/test.yaml
            tests/tackle-testapp-package-filter/test.yaml
            tests/tackle-testapp-with-custom-rules/test.yaml
            tests/tackle-testapp-with-deps/test.yaml
            tests/tackle-testapp-with-deps-local/test.yaml
          )
          for test_file in "${JAVA_TESTS[@]}"; do
            name="$(basename "$(dirname "${test_file}")")"
            echo "::group::${test_file}"
            koncur run "${test_file}" -t kantra --target-config .koncur/config/target-kantra.yaml \
              -o yaml --output-file "koncur-local-results/${name}.yaml"
            echo "::endgroup::"
          done

      - name: Upload output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: koncur-kantra-local-${{ inputs.os }}-failures
          path: .koncur/output 
          retention-days: 5
          include-hidden-files: true

      - name: Upload result yaml
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: koncur-kantra-local-${{ inputs.os }}-summary
          path: koncur-local-results
          retention-days: 3
