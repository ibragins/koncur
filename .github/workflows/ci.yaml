name: Koncur Repo CI testing

on:
  pull_request:
    branches:
      - "main"

jobs:
  run-kantra-test:
    strategy:
      fail-fast: false
      matrix:
        # Using macos to test amd64 and ubuntu to test arm
        # This is because you can't use container's on mac os arm runners.
        os: [macos-15-intel, ubuntu-24.04-arm, windows-latest]
        exclude:
          - os: macos-15-intel
    uses: ./.github/workflows/kantra.yaml
    with:
      os: ${{ matrix.os }}

  # Java-analysis tests only, Kantra --run-local=true (see kantra-local.yaml). Skips nerd-dinner / python-sample.
  run-kantra-java-local-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, ubuntu-24.04-arm, windows-latest]
        exclude:
          - os: macos-15-intel
    uses: ./.github/workflows/kantra-local.yaml
    with:
      os: ${{ matrix.os }}

  run-hub-test:
    secrets: inherit
    uses: ./.github/workflows/hub.yaml
    with:
      skip_maven: true
