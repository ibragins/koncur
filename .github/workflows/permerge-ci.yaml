name: Koncur Repo premerge testing

# This should run when we accept a PR to be mergable
# This will allow us to safely use the maven credentials
on:
  push:
  pull_request_target:
    types:
      - auto_merge_enabled
    branches:
      - "main"

jobs:
  run-kantra-test:
    strategy:
      fail-fast: false
      matrix:
        # Using macos to test amd64 and ubuntu to test arm
        # This is because you can't use container's on mac os arm runners.
        os: [macos-15-intel, ubuntu-24.04-arm, windows-latest]
        exclude:
          - os: macos-15-intel
    secrets: inherit
    uses: ./.github/workflows/kantra.yaml
    with:
      os: ${{ matrix.os }}
      skip_maven: false

  run-kantra-java-local-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, ubuntu-24.04-arm, windows-latest]
        exclude:
          - os: macos-15-intel
    secrets: inherit
    uses: ./.github/workflows/kantra-local.yaml
    with:
      os: ${{ matrix.os }}
      skip_maven: false

  run-hub-test:
    secrets: inherit
    uses: ./.github/workflows/hub.yaml
    with:
      skip_maven: false
