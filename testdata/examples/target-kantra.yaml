type: kantra
kantra:
  binaryPath: /usr/local/bin/kantra  # Optional, will use PATH if not specified
  mavenSettings: /path/to/settings.xml  # Optional, only needed for Maven projects requiring custom settings

  # ForceLocal controls how analysis is executed.
  # If not set or true, passes --run-local=true: Java analysis runs locally (containerless),
  # while other analyses run in containers (the argument is ignored for non-Java analysis).
  # If set to false, passes --run-local=false: all analyses run in containers.
  # forceLocal: true

  # Optional: override container images (default target uses --run-local=false)
  # runnerImage: quay.io/konveyor/kantra:latest
  # javaProviderImage: quay.io/konveyor/java-external-provider:latest
  # genericProviderImage: quay.io/konveyor/generic-external-provider:latest
  # csharpProviderImage: quay.io/konveyor/c-sharp-provider:latest
